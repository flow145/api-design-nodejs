name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24
  PNPM_VERSION: 10

jobs:
  check:
    name: Quality check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install

      - name: Format and lint
        run: pnpm biome ci

      - name: Check types
        run: pnpm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      MAINTENANCE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/habit_tracker_test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install

      - name: Create databases
        env:
          POSTGRES_USER: postgres
          MAINTENANCE_DATABASE: postgres
        run: bash scripts/create-databases.sh

      - name: Run migrations
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
        run: pnpm db:migrate

      - name: Test
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
        run: pnpm test

  build:
    name: Build
    needs: [check, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Upload build
        uses: actions/upload-artifact@v6
        with:
          name: build
          path: dist
          retention-days: 7
