services:
  db:
    image: postgres:18-alpine
    container_name: habit_tracker_db
    restart: on-failure:5
    environment:
      POSTGRES_DB: '${DATABASE_MAINTENANCE}'
      POSTGRES_USER: '${DATABASE_USER}'
      POSTGRES_PASSWORD: '${DATABASE_PASSWORD}'
    ports:
      - '${DATABASE_PORT}:5432'
    volumes:
      - db_data:/var/lib/postgresql
      - ./scripts/create-databases.sh:/docker-entrypoint-initdb.d/10-create-databases.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER} -d ${DATABASE_MAINTENANCE}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  db_data:
    name: habit_tracker_data
